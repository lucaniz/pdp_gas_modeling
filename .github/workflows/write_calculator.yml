name: Write calculator

on:
  workflow_dispatch:

jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write calculator.html
        run: |
          python3 << 'PYEOF'
          import base64, gzip
          b64 = ""
          data = gzip.decompress(base64.b64decode(b64))
          with open('calculator.html', 'wb') as f:
              f.write(data)
          text = data.decode('utf-8')
          assert text.count('id="main-content"') == 1, "DUPLICATE DETECTED"
          print(f"✓ Written {len(data)} bytes, no duplication")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f calculator.html
          git diff --cached --quiet || git commit -m "fix: calculator tabs + reference table wrapping"
          git push
