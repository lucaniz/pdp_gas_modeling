name: Write calculator

on:
  workflow_dispatch:

jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Decode and write calculator.html
        run: |
          python3 << 'EOF'
          import base64, gzip
          b64 = ""
          data = gzip.decompress(base64.b64decode(b64))
          open('calculator.html', 'wb').write(data)
          print(f"Written {len(data)} bytes to calculator.html")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calculator.html
          git diff --cached --quiet || git commit -m "chore: update calculator.html"
          git push
