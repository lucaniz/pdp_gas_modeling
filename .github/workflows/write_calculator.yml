name: Write calculator
on:
  workflow_dispatch:
jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Write calculator.html
        run: |
          python3 << 'PYEOF'
          import base64, gzip
          b64 = ""
          data = gzip.decompress(base64.b64decode(b64))
          with open('calculator.html', 'wb') as f:
              f.write(data)
          print(f"Written {len(data)} bytes")
          PYEOF
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f calculator.html
          git commit --allow-empty -m "docs: add batching notes on data freshness and extrapolation"
          git push
