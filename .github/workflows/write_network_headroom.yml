name: Write network headroom

on:
  workflow_dispatch:

jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Decode and write network_headroom.html
        run: |
          python3 << 'PYEOF'
          import base64, gzip
          b64 = ""
          data = gzip.decompress(base64.b64decode(b64))
          open('network_headroom.html', 'wb').write(data)
          print(f"Written {len(data)} bytes to network_headroom.html")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add network_headroom.html
          git diff --cached --quiet || git commit -m "update: network_headroom.html with data as of 2026-04-21"
          git push
