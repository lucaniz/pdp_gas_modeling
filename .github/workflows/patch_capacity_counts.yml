name: Patch capacity dataset counts
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
 
      - name: Fetch live data and patch capacity.html
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, re, math
          from datetime import datetime
 
          def foc_query(sql):
              req = urllib.request.Request(
                  'https://foc-observer.va.gg/sql',
                  data=json.dumps({'sql': sql, 'network': 'mainnet'}).encode(),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read())['rows']
 
          # 1. Get live active dataset count and total stats
          rows = foc_query('''
              SELECT
                COUNT(DISTINCT f.data_set_id) FILTER (WHERE t.data_set_id IS NULL) as active,
                COUNT(DISTINCT p.piece_id) as pieces,
                COALESCE(SUM(p.raw_size), 0) as total_bytes
              FROM fwss_data_set_created f
              LEFT JOIN fwss_service_terminated t ON t.data_set_id = f.data_set_id
              LEFT JOIN fwss_piece_added p ON p.data_set_id = f.data_set_id
              WHERE t.data_set_id IS NULL
          ''')
          active  = int(rows[0]['active'])
          pieces  = int(rows[0]['pieces'])
          tbytes  = int(rows[0]['total_bytes'])
          print(f'Live: {active} active datasets, {pieces} pieces, {tbytes/1024**4:.2f} TiB')
 
          # 2. Get today's proving gas (for HIST last entry)
          today_rows = foc_query('''
              SELECT
                COUNT(DISTINCT set_id) as proving_ds,
                COALESCE(SUM(gas_used), 0) as total_gas
              FROM pdp_possession_proven
              WHERE timestamp >= EXTRACT(EPOCH FROM NOW()) - 86400
          ''')
          proving_ds  = int(today_rows[0]['proving_ds'])
          proving_gas = int(today_rows[0]['total_gas'])
 
          # Also add nextProvingPeriod gas
          npp_rows = foc_query('''
              SELECT COALESCE(SUM(gas_used), 0) as npp_gas
              FROM pdp_next_proving_period
              WHERE timestamp >= EXTRACT(EPOCH FROM NOW()) - 86400
          ''')
          npp_gas = int(npp_rows[0]['npp_gas'])
          total_daily_gas = proving_gas + npp_gas
 
          print(f'Today: {proving_ds} datasets proving, {total_daily_gas/1e9:.1f} Ggas')
 
          today_label = datetime.utcnow().strftime('%-d %b').replace(' 0', ' ')
          print(f'Today label: {today_label}')
 
          with open('capacity.html', 'r') as f:
              content = f.read()
 
          # 3. Replace last HIST entry with today's live data
          # Pattern: {day:'...',ds:NNN,gas:NNN}
          hist_pattern = re.compile(r"(\{day:'[^']*',ds:)(\d+)(,gas:)(\d+)(\}(?:\s*\];))")
          m = hist_pattern.search(content)
          if m:
              new_entry = f"{{day:'{today_label}',ds:{active},gas:{total_daily_gas}}}" + "];"
              content = content[:m.start()] + new_entry + content[m.end():]
              print(f'Patched last HIST entry: ds={active}, gas={total_daily_gas}')
          else:
              print('WARNING: could not find last HIST entry pattern')
 
          # 4. Update FWSS_REAL object
          avg_piece = tbytes // pieces if pieces > 0 else 2270284
          fwss_real_new = (
              f"const FWSS_REAL = {{\n"
              f"  datasets:   {active},\n"
              f"  pieces:     {pieces},\n"
              f"  bytes:      {tbytes},\n"
              f"  avgPieceBytes: {avg_piece},\n"
              f"}};"
          )
          content = re.sub(
              r'const FWSS_REAL = \{[^}]+\};',
              fwss_real_new,
              content
          )
          print(f'Patched FWSS_REAL: datasets={active}, pieces={pieces}')
 
          # 5. Update hardcoded text mentions
          content = re.sub(r'\b632 active datasets\b', f'{active} active datasets', content)
          content = re.sub(r'\b630 active datasets\b', f'{active} active datasets', content)
          content = re.sub(r'\b480 active datasets\b', f'{active} active datasets', content)
 
          with open('capacity.html', 'w') as f:
              f.write(content)
          print(f'Done: {len(content)} chars')
          PYEOF
 
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f capacity.html
          git commit --allow-empty -m "fix: patch HIST last entry and FWSS_REAL with live FOC Observer data"
          git push
