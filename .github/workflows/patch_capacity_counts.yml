name: Patch capacity dataset counts
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'
jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live dataset count and patch capacity.html
        run: |
          python3 - << 'PYEOF'
          import urllib.request, json, re

          # Fetch live active dataset count from FOC Observer
          req = urllib.request.Request(
              'https://foc-observer.va.gg/sql',
              data=json.dumps({
                  'sql': 'SELECT COUNT(DISTINCT f.data_set_id) FILTER (WHERE t.data_set_id IS NULL) as active FROM fwss_data_set_created f LEFT JOIN fwss_service_terminated t ON t.data_set_id = f.data_set_id',
                  'network': 'mainnet'
              }).encode(),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read())
          active = int(data['rows'][0]['active'])
          print(f'Live active datasets: {active}')

          with open('capacity.html', 'r') as f:
              content = f.read()

          # Fix 1: patch the last entry of HIST array
          # HIST entries look like: {day:'Apr 21',ds:132,gas:...}
          # Replace the ds value in the last HIST entry with live count
          content = re.sub(
              r"(\{day:'[^']+',ds:)\d+([^}]*\}\s*\];)",
              lambda m: m.group(1) + str(active) + m.group(2),
              content
          )

          # Fix 2: also replace standalone occurrences of old hardcoded counts
          # in JS variable assignments like: const N_TODAY = 132
          content = re.sub(r'(const N_TODAY\s*=\s*)\d+', r'\g<1>' + str(active), content)
          content = re.sub(r'(N_datasets\s*=\s*)\d+(?=\s*[;,/])', r'\g<1>' + str(active), content)

          with open('capacity.html', 'w') as f:
              f.write(content)
          print(f'Done: {len(content)} chars, active={active}')
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f capacity.html
          git commit --allow-empty -m "fix: patch HIST last ds value with live active dataset count"
          git push
