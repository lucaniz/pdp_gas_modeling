name: Write capacity

on:
  workflow_dispatch:

jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Decode and write capacity.html
        run: |
          python3 << 'PYEOF'
          import base64, gzip
          b64 = ""
          data = gzip.decompress(base64.b64decode(b64))
          open('capacity.html', 'wb').write(data)
          print(f"Written {len(data)} bytes to capacity.html")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add capacity.html
          git diff --cached --quiet || git commit -m "update: capacity.html with data as of 2026-04-21"
          git push
