name: Update gas model

on:
  schedule:
    - cron: "0 9 * * *"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print results but do not commit"
        required: false
        default: "false"
        type: boolean

  repository_dispatch:
    types: [refit-model]

jobs:
  refit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests numpy scipy

      - name: Verify dependencies
        run: |
          python3 -c "import requests, numpy, scipy; from scipy.optimize import curve_fit; print('OK - all imports work')"

      - name: Run refit script
        run: python scripts/refit_model.py

      - name: Check summary file exists
        run: |
          if [ ! -f /tmp/model_summary.json ]; then
            echo '{"date":"unknown","alpha":0,"beta":0,"npp":0,"r2":0,"mae":0,"n_datasets":0,"files_changed":false}' > /tmp/model_summary.json
          fi
          cat /tmp/model_summary.json

      - name: Read model summary
        id: summary
        run: |
          echo "n=$(jq -r .n_datasets /tmp/model_summary.json)" >> $GITHUB_OUTPUT
          echo "r2=$(jq -r .r2 /tmp/model_summary.json)" >> $GITHUB_OUTPUT
          echo "mae=$(jq -r '.mae / 1000000' /tmp/model_summary.json)" >> $GITHUB_OUTPUT
          echo "alpha=$(jq -r '.alpha / 1000000' /tmp/model_summary.json)" >> $GITHUB_OUTPUT
          echo "beta=$(jq -r '.beta / 1000000' /tmp/model_summary.json)" >> $GITHUB_OUTPUT
          echo "date=$(jq -r .date /tmp/model_summary.json)" >> $GITHUB_OUTPUT
          echo "changed=$(jq -r .files_changed /tmp/model_summary.json)" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: >
          steps.summary.outputs.changed == 'true' &&
          (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add calculator.html capacity.html README.md
          git commit -m "chore: refit gas model — ${{ steps.summary.outputs.date }}

          Trigger: ${{ github.event_name }}
          Datasets: ${{ steps.summary.outputs.n }}
          R2: ${{ steps.summary.outputs.r2 }}  MAE: ${{ steps.summary.outputs.mae }}M gas"
          git push

      - name: No changes
        if: steps.summary.outputs.changed == 'false'
        run: echo "Coefficients unchanged — nothing to commit."

      - name: Dry run output
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          echo "DRY RUN - no commit"
          echo "n_datasets: ${{ steps.summary.outputs.n }}"
          echo "R2: ${{ steps.summary.outputs.r2 }}"
